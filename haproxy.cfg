global
    maxconn 4096
    nbthread 1

defaults
    mode tcp
    no log
    option dontlognull
    retries 0
    timeout connect 50ms
    timeout client 2s
    timeout server 2s
    timeout queue 2s

frontend fraud_front
    bind *:9999
    default_backend fraud_back

backend fraud_back
    balance roundrobin
    server api1 /var/run/rinha/api1.sock check maxconn 2048
    server api2 /var/run/rinha/api2.sock check maxconn 2048
