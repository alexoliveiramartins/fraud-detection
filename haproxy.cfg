global
    maxconn 4096
    nbthread 1
    log stdout format raw local0

defaults
    mode http
    option httplog
    option dontlognull

    timeout connect 200ms
    timeout client  2000ms
    timeout server  2000ms
    timeout http-request 2000ms

frontend fraud_front
    bind *:9999
    default_backend fraud_back

backend fraud_back
    balance roundrobin
    option http-keep-alive
    http-reuse safe

    server api1 api1:8080 maxconn 2048
    server api2 api2:8080 maxconn 2048

