global
    maxconn 4096
    nbthread 1

defaults
    mode tcp
    timeout connect 200ms
    timeout client  2000ms
    timeout server  2000ms

frontend fraud_front
    bind *:9999
    default_backend fraud_back

backend fraud_back
    balance roundrobin
    server api1 api1:8080 check maxconn 2048
    server api2 api2:8080 check maxconn 2048

