worker_processes 1;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/null crit;

    tcp_nodelay on;
    
    upstream backend {
        keepalive 64;

        server api1:8080;
        server api2:8080;
    }

    server {
        listen 9999 reuseport backlog=4096;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 5s;
            proxy_connect_timeout 2s;
            
            proxy_pass http://backend;
        }
    }
}
