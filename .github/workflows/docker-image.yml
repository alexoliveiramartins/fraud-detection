name: Publish Docker image

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/alexoliveiramartins/fraud-detection:latest
            ghcr.io/alexoliveiramartins/fraud-detection:${{ github.sha }}

      - uses: actions/checkout@v4
        with:
          ref: submission
          path: submission

      - name: Update submission compose image
        working-directory: submission
        run: |
          sed -i -E 's|ghcr\.io/alexoliveiramartins/fraud-detection:[^[:space:]]+|ghcr.io/alexoliveiramartins/fraud-detection:${{ github.sha }}|g' docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "chore: update submission image tag" || exit 0
          git push origin HEAD:submission
