services:
  api1:
    image: ghcr.io/alexoliveiramartins/fraud-detection:latest
    hostname: api1
    platform: linux/amd64
    networks:
      - fraud-network
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  api2:
    image: ghcr.io/alexoliveiramartins/fraud-detection:latest
    hostname: api2
    platform: linux/amd64
    networks:
      - fraud-network
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160MB"

  nginx:
    image: nginx:1.27-alpine
    hostname: nginx
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - fraud-network
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "30MB"

networks:
  fraud-network:
    driver: bridge
