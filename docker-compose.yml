services:
  api1:
    image: ghcr.io/alexoliveiramartins/fraud-detection:59143b4975cc21fbcc5b1b815774f06a46981db7
    hostname: api1
    platform: linux/amd64
    networks:
      - fraud-network
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160MB"

  api2:
    image: ghcr.io/alexoliveiramartins/fraud-detection:59143b4975cc21fbcc5b1b815774f06a46981db7
    hostname: api2
    platform: linux/amd64
    networks:
      - fraud-network
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160MB"

  haproxy:
    image: haproxy:3.0-alpine
    hostname: haproxy
    platform: linux/amd64
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    networks:
      - fraud-network
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30MB"

networks:
  fraud-network:
    driver: bridge
